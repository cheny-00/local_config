# ============================================================
# GENERATED FILE - DO NOT EDIT
# 源: 私有 chezmoi dotfiles 仓库的 linux 渲染，手改必被覆盖
# 更新: 在 Mac 上运行 dotfiles 仓库的 .scripts/sync-server-configs.sh
# ============================================================

# ==========================
#  基础设置
# ==========================
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -g default-terminal "tmux-256color"
# 真彩色：tmux-256color/xterm-256color 的 terminfo 都没 RGB 能力，这里手动补。
# 用具体 term 名（外层 client 实测是 xterm-256color）比 *:RGB 通配更可靠，
# 另加 xterm-kitty 与 *:RGB 兜底其它外层终端。改完需 tmux kill-server 重连才生效。
set -as terminal-features "xterm-256color:RGB,xterm-kitty:RGB,*:RGB"
set-option -g status-position top
# 外层终端(kitty)窗口/标签标题跟随「会话:窗口」
set -g set-titles on
set -g set-titles-string "#S:#W"

# 原 tmux-sensible 提供的设置，显式写出（escape-time 不取 0，避免 ESC 序列拆包误读）
set -s escape-time 10
set -g history-limit 50000
set -g focus-events on
setw -g aggressive-resize on
# 补齐 sensible 其余三项:提示停留 4s(默认 750ms 中文读不完)、":"命令行 readline 风格、状态栏 5s 刷新
set -g display-time 4000
set -g status-keys emacs
set -g status-interval 5


# OSC 52 剪贴板支持（关键配置）
set -g allow-passthrough on
set -g set-clipboard on


# ==========================
#  插件列表
# ==========================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# 将导航键设置为 Alt (Meta) + h/j/k/l
set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_down "M-j"
set -g @vim_navigator_mapping_prev "M-\\"

# 防护:Alt+[ 等同于 ESC[(CSI 前缀),误按会让输入解析器卡死。
# 这里显式拦截,把它变成一条提示而非未完成的转义序列。
# 自检:按 Alt+[ 若看到提示=拦截生效;若仍卡死=终端把 ESC[ 当 CSI 提前吞了,只能避开此键。
bind -n M-[ display-message "Alt+[ 已拦截(与 ESC[ 冲突,已忽略)"

# 直接切换前后 tab(window),无需 prefix
# 注意:M-. 会遮蔽 zsh 的 insert-last-word(插入上一命令的末参数);要用该功能就得给这两个换键
bind -n M-, previous-window
bind -n M-. next-window

# M-数字 直达对应窗口(zsh 的 Esc-数字是 digit-argument,基本没人用,不怕遮蔽)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'off'
# 恢复时连 pane 可见文本一起还原;nvim 经 session 文件恢复(需 auto-session/mksession 配合,无 session 文件时退化为裸启动)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# 复制增强三件套
# tmux-yank: copy-mode 按 y / 鼠标选中 → 系统剪贴板
set -g @plugin 'tmux-plugins/tmux-yank'
# tmux-thumbs: prefix+u 屏幕取词（路径/URL/hash），按提示字母复制到剪贴板
# （不用 F：与自带的 prefix+f find-window 太近）
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key u
# 服务器无 pbcopy：set-buffer -w 经 OSC52 同步到外层终端的系统剪贴板
set -g @thumbs-command 'tmux set-buffer -w -- "{}" && tmux display-message "已复制: {}"'
set -g @thumbs-upcase-command 'tmux set-buffer -w -- "{}" && tmux paste-buffer && tmux display-message "已粘贴: {}"'
# extrakto: prefix+Tab 用 fzf 模糊抓取屏幕上的任意 token，Tab 插入 / Enter 复制
set -g @plugin 'laktak/extrakto'

# 硬件监控插件
set -g @plugin 'tmux-plugins/tmux-cpu'

# 主题插件
set -g @plugin 'catppuccin/tmux#v2.1.3'

# 裸机引导:TPM 缺失时自动 clone 并安装上面声明的全部插件
# (必须放在下面手动 run catppuccin 之前,否则新机器首启会报错)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# ==========================
#  主题详细配置 (Catppuccin v2)
# ==========================
set -g @catppuccin_flavor 'latte'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_text " #W"

run ~/.tmux/plugins/tmux/catppuccin.tmux

# ==========================
#  背景色透传 (修 tmux 内 TUI 暗色主题问题)
# ==========================
# 默认 tmux 对里面程序的 OSC 11「背景色查询」回答纯黑(0/0/0),因为它没拿到外层 kitty
# 的真实背景(client_termname=xterm-256color,原生 client 查询没生效)。于是 Neovim 等
# 程序探测到深色背景 → catppuccin 切到 mocha(暗)。
# 这里把 tmux 自己的 pane 背景/前景显式设成 catppuccin 主题色(= kitty 的 #eff1f5/#4c4f69),
# tmux 便据此应答 OSC 11/10 → 所有会探测背景的 TUI(nvim/bat/delta/fzf…)都拿到浅色。
# 用 #{@thm_bg}/#{@thm_fg} 而非硬编码,改 @catppuccin_flavor 时自动跟随。必须放在插件 run 之后。
set -g window-style 'bg=#{@thm_bg},fg=#{@thm_fg}'

# ==========================
#  状态栏手动拼接
# ==========================
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"

# 应用名
set -g status-right "#{E:@catppuccin_status_application}"
# CPU
set -agF status-right "#{E:@catppuccin_status_cpu}"
# 内存 (手工打造)
set -ag status-right "#[bg=default,fg=#{@thm_pink}]#[bg=#{@thm_pink},fg=#{@thm_crust}] #[bg=#{@thm_surface_0},fg=#{@thm_fg}] #{ram_percentage}#[bg=default,fg=#{@thm_surface_0}]"
# 运行时间
set -ag status-right "#{E:@catppuccin_status_uptime}"

# ==========================
#  常规键位
# ==========================
# 分屏/新窗口继承当前 pane 目录(tmux 默认回到 session 起始目录)
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
# prefix+r 重载配置(覆盖默认 refresh-client)
bind r source-file ~/.tmux.conf \; display-message "config reloaded"
# prefix+! 弹窗临时终端,shell 退出即关(覆盖默认 break-pane)
bind ! display-popup -E -d "#{pane_current_path}" -w 80% -h 75%

# ==========================
#  copy-mode 键位 (vim 风格)
# ==========================
# 默认 v=rectangle-toggle(块选)、Space=begin-selection。
# 这里改成 vim 习惯：v 开始选择，C-v 切块选，y 复制(tmux-yank 已绑)。
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ==========================
#  初始化 TPM
# ==========================
run '~/.tmux/plugins/tpm/tpm'
